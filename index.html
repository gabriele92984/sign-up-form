<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>Sign-up Form</title>
</head>

<body>
  <div class="main-wrapper">

    <div class="left-wrapper">
      <div class="left-upper-wrapper">
        <div class="odin-wrapper">
          <img class="odin-lined" src="./images/odin-lined.png" alt="The Odin Project Logo">
          <h1 class="odin-text">ODIN</h1>
        </div>
      </div>
      <div class="left-bottom-wrapper">
        <div class="img-credit-creator">
          <p>Photo by <a href="">Halie West</a> on <a href="">Unsplash</a></p>
        </div>
      </div>
    </div>

    <div class="right-wrapper">
      <div>
        <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
        <p>You <em>know</em> you want to.</p>
      </div>
      <div>
        <div>
          <p>Let's do this!</p>
        </div>
        <form action="">
          <div>
            <div>
              <label for="first_name">FIRST NAME</label>
              <input type="text" name="first_name" id="first_name">
            </div>
            <div>
              <label for="user_email">EMAIL</label>
              <input type="email" name="email" id="user_email" placeholder="you@example.com">
            </div>
            <div>
              <label for="user_password">PASSWORD</label>
              <input type="password" name="password" id="user_password">
            </div>
          </div>
          <div>
            <div>
              <label for="last_name">LAST NAME</label>
              <input type="text" name="last_name" id="last_name">
            </div>
            <div>
              <label for="phone_number">PHONE NUMBER</label>
              <input type="text" name="phone_number" id="phone_number" inputmode="numeric">
            </div>
            <div>
              <label for="user_password_confirm">CONFIRM PASSWORD</label>
              <input type="password" name="user_password_confirm" id="user_password_confirm">
            </div>
            <div>
              <button type="submit">Create Account</button>
            </div>
          </div>
        </form>
      </div>
      <div>
        <div>
          <p>Already have an account? <span>Log in</span></p>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
